name: "GitHub 조직 멤버 가입 신청"
description: "Cloud-Native-Community-Korea GitHub 조직 멤버 가입을 신청합니다."
title: "[멤버 가입 신청] <GitHub 사용자명>"
labels:
  - membership
body:
  - type: markdown
    attributes:
      value: |
        ## GitHub 조직 멤버 가입 신청

        CNCK(Cloud Native Community Korea) **활동 멤버** 를 대상으로 GitHub 조직 멤버 가입 신청을 받고 있습니다.

        **가입 조건**: 활동 멤버 기준 중 하나 이상을 충족해야 합니다.
        - 분기당 이벤트 1회 이상 참석
        - SIG 활동 월 1회 이상 참여
        - 콘텐츠 기여 (뉴스레터 기고, 발표 자료 공유 등) 분기 1회 이상

  - type: input
    id: github-username
    attributes:
      label: GitHub 사용자명
      description: "GitHub 사용자명을 입력해 주세요."
      placeholder: "예: cnck-user"
    validations:
      required: true

  - type: input
    id: slack-display-name
    attributes:
      label: CNCK Slack 표시 이름
      description: "CNCK Slack 워크스페이스에서 사용 중인 표시 이름을 입력해 주세요."
      placeholder: "예: 홍길동"
    validations:
      required: true

  - type: checkboxes
    id: activity-criteria
    attributes:
      label: 활동 멤버 기준 충족 항목
      description: "현재 충족하고 있는 항목을 모두 선택해 주세요."
      options:
        - label: "분기당 이벤트 1회 이상 참석"
        - label: "SIG 활동 월 1회 이상 참여"
        - label: "콘텐츠 기여 (뉴스레터 기고, 발표 자료 공유 등) 분기 1회 이상"
    validations:
      required: true

  - type: textarea
    id: activity-details
    attributes:
      label: 활동 내역
      description: "위에서 선택한 항목에 대한 구체적인 활동 내역을 간략히 기술해 주세요. (예: 참석 이벤트명, 소속 SIG, 기여 콘텐츠 등)"
      placeholder: |
        - 2026년 1월 CNCK 밋업 참석
        - SIG-Kubernetes 월 2회 스터디 참여
    validations:
      required: true

  - type: dropdown
    id: sig-affiliation
    attributes:
      label: 소속 SIG (해당 시)
      description: "현재 참여 중인 SIG가 있다면 선택해 주세요."
      options:
        - "해당 없음"
        - "기타 (아래에 기재)"
    validations:
      required: false

  - type: textarea
    id: additional-info
    attributes:
      label: 기타 사항
      description: "추가로 전달하고 싶은 내용이 있다면 자유롭게 작성해 주세요."
    validations:
      required: false

  - type: checkboxes
    id: agreement
    attributes:
      label: 동의 사항
      description: "아래 항목에 동의해 주세요."
      options:
        - label: "CNCK [행동 강령(Code of Conduct)](https://github.com/Cloud-Native-Community-Korea/community/blob/main/code-of-conduct.md)을 읽었으며 이를 준수하겠습니다."
          required: true
        - label: "GitHub 조직 멤버로서 커뮤니티 저장소의 운영 정책을 준수하겠습니다."
          required: true
